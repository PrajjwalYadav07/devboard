name: cipipeline

on:
    push:
        branches: [advance]

jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: install nodejs
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json
            
            - name: install packages
              run: npm install
              working-directory: devboard/frontend

            - name: linter
              run: npm run lint
              working-directory: devboard/frontend

            - name: run tests
              run: npm run test
              working-directory: devboard/frontend



