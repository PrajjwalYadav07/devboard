name: cipipeline

on:
    push:
        branches: [advance]
    
jobs:
    frontend:
        runs-on: unbuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Set up Node.js
              uses: actions/setup-node@v2
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json

            - name: Install packages
              run: npm install
              working-directory: frontend

            - name: Run lint
              run: npm run lint
              working-directory: frontend

            - name: Run tests
              run: npm test
              working-directory: frontend